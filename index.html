<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>体験チェックリスト</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- ログイン画面 -->
  <div id="login-screen">
    <div class="login-container">
      <h1 class="login-title">体験チェックリスト</h1>
      <p class="login-subtitle">パスワードを入力してください</p>
      <input type="password" class="login-input" id="login-password" placeholder="パスワード" autocomplete="current-password">
      <button class="login-btn" id="login-btn">ログイン</button>
      <p class="login-error" id="login-error"></p>
    </div>
  </div>

  <div id="app" style="display:none;">
    <header class="top-bar">
      <h1 class="top-title">体験チェックリスト</h1>
      <span class="top-date" id="today-date"></span>
    </header>
    <nav class="tab-nav">
      <button class="tab active" data-tab="bookings">予約一覧</button>
      <button class="tab" data-tab="admin">管理</button>
    </nav>
    <main class="screen active" id="screen-bookings">
      <div class="screen-scroll">
        <div id="bookings-list">
          <div class="empty-state"><div class="empty-state-text">読み込み中...</div></div>
        </div>
      </div>
    </main>
    <main class="screen" id="screen-select">
      <div class="screen-scroll">
        <div class="screen-header">
          <button class="back-btn" id="back-to-bookings">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            予約一覧
          </button>
          <span class="header-time" id="select-time"></span>
        </div>
        <div class="event-info">
          <h2 class="event-title" id="select-title"></h2>
          <p class="event-meta" id="select-meta"></p>
          <p class="event-cal" id="select-cal"></p>
        </div>
        <p class="section-label">チェックリストを選択</p>
        <div id="checklist-options"></div>
        <button class="action-btn disabled" id="start-checklist-btn" disabled>チェックリストを選んでください</button>
      </div>
    </main>
    <main class="screen" id="screen-checklist">
      <div class="screen-scroll">
        <div class="screen-header">
          <button class="back-btn" id="back-to-select">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            選択に戻る
          </button>
          <span class="header-time" id="cl-time"></span>
        </div>
        <div class="event-info">
          <h2 class="event-title"><span id="cl-event-name"></span> / <span class="accent" id="cl-type-name"></span></h2>
        </div>
        <div class="progress-section">
          <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
          <span class="progress-text" id="progress-text">0/0</span>
        </div>
        <div id="checklist-items"></div>
        <button class="action-btn disabled" id="complete-btn" disabled>全て完了するとOK送信できます</button>
      </div>
    </main>
    <main class="screen" id="screen-admin">
      <div class="screen-scroll">
        <p class="section-label">体験種類ごとのチェックリスト管理</p>
        <div id="admin-list"></div>
        <button class="add-type-btn" id="add-type-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3V13M3 8H13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          新しい体験種類を追加
        </button>
      </div>
    </main>
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="modal-title">項目を追加</h3>
          <button class="modal-close" id="modal-close">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M6 6L14 14M14 6L6 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <label class="form-label">項目名</label>
          <input type="text" class="form-input" id="modal-item-name" placeholder="例: 染料の準備">
          <label class="form-label">カテゴリ</label>
          <div class="toggle-group">
            <button class="toggle-btn active" data-cat="prep" id="cat-prep">準備</button>
            <button class="toggle-btn" data-cat="cleanup" id="cat-cleanup">片付け</button>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="modal-cancel">キャンセル</button>
          <button class="btn-primary" id="modal-save">保存</button>
        </div>
      </div>
    </div>
    <div class="modal-overlay" id="modal-type-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title">体験種類を追加</h3>
          <button class="modal-close" id="modal-type-close">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M6 6L14 14M14 6L6 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <label class="form-label">体験種類の名前</label>
          <input type="text" class="form-input" id="modal-type-name" placeholder="例: 陶芸体験">
          <label class="form-label">略称（1文字）</label>
          <input type="text" class="form-input" id="modal-type-icon" placeholder="例: 陶" maxlength="2">
          <label class="form-label">テーマカラー</label>
          <div class="color-options" id="color-options">
            <button class="color-btn selected" data-color="blue" style="background:#DBEAFE;color:#1E40AF">染</button>
            <button class="color-btn" data-color="coral" style="background:#FEE2E2;color:#991B1B">陶</button>
            <button class="color-btn" data-color="green" style="background:#DCFCE7;color:#166534">木</button>
            <button class="color-btn" data-color="purple" style="background:#EDE9FE;color:#5B21B6">紫</button>
            <button class="color-btn" data-color="amber" style="background:#FEF3C7;color:#92400E">黄</button>
            <button class="color-btn" data-color="pink" style="background:#FCE7F3;color:#9D174D">桃</button>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="modal-type-cancel">キャンセル</button>
          <button class="btn-primary" id="modal-type-save">追加</button>
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>
  </div>
  <script src="/js/store.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
